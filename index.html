    <style>
        body, html {
            background-color: #5c94fc; 
            font-family: system-ui, -apple-system, sans-serif;
            touch-action: manipulation;
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            height: 100dvh;
            /* הקיבוע המוחלט שימנע סליידרים בכל מצב: */
            position: fixed; 
            top: 0;
            left: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #root {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* שיפור רספונסיביות - הלוח יתאים את עצמו בבטחה ולעולם לא יגרום לגלילה */
        .board-wrapper {
            width: 100%;
            max-width: min(96%, calc(100dvh - 260px)); 
            aspect-ratio: 1 / 1;
            margin: 0 auto;
        }
        /* התאמת גופנים דינמית לאמוג'י כך שלא יחרגו מהמשבצת במסכים שונים */
        .emoji-size-4 { font-size: clamp(2rem, 8vmin, 6rem); }
        .emoji-size-6 { font-size: clamp(1.5rem, 6vmin, 4.5rem); }
        
        .pop-in {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }
        .touch-none-strict {
            touch-action: none;
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
            user-drag: none;
            user-select: none;
            -webkit-user-select: none;
        }
    </style>

        const { useState, useEffect, useMemo, useRef } = React;

        const getSounds = () => {
            if (!window.gameSounds) {
                try {
                    window.gameSounds = {
                        pop: new Audio('https://assets.mixkit.co/active_storage/sfx/3005/3005-preview.mp3'),
                        error: new Audio('https://assets.mixkit.co/active_storage/sfx/2573/2573-preview.mp3'),
                        win: new Audio('https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3'),
                        fail: new Audio('https://assets.mixkit.co/active_storage/sfx/3114/3114-preview.mp3')
                    };
                    Object.values(window.gameSounds).forEach(audio => audio.volume = 0.5);
                } catch(e) {
                    window.gameSounds = {}; 
                }
            }
            return window.gameSounds;
        };

        const playSound = (type) => {
            try {
                const sounds = getSounds();
                if (sounds && sounds[type]) {
                    sounds[type].currentTime = 0;
                    sounds[type].play().catch(e => {});
                }
            } catch(e) {}
        };

                let shuffled = [...symbols].sort(() => Math.random() - 0.5);
                for (let i = 0; i < shuffled.length; i++) {
                    let sym = shuffled[i];
                    if (isValid(b, empty.r, empty.c, sym, size)) {
                        b[empty.r][empty.c] = sym;
                        if (fill(b)) return true;
                        b[empty.r][empty.c] = null;
                    }
                }
                return false;
            };

            fill(board);

            let cells = [];
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    cells.push({ r, c });
                }
            }
            cells.sort(() => Math.random() - 0.5); 

            let holes = 0;
            let puzzle = board.map(row => [...row]);
            
            for (let i = 0; i < cells.length; i++) {
                let cell = cells[i];
                if (holes >= targetHoles) break;
                let temp = puzzle[cell.r][cell.c];
                puzzle[cell.r][cell.c] = null;
                
                let checkBoard = puzzle.map(row => [...row]);
                if (countSolutions(checkBoard, size, symbols) !== 1) {
                    puzzle[cell.r][cell.c] = temp; 
                } else {
                    holes++;
                }
            }
            return puzzle;
        };

        const App = () => {
            const [currentLevelIdx, setCurrentLevelIdx] = useState(0);
            const [initialBoard, setInitialBoard] = useState([]); 
            const [board, setBoard] = useState([]);
            
            const [isGenerating, setIsGenerating] = useState(true);
            const [shakingCells, setShakingCells] = useState(new Set()); 
            
            const [isSolved, setIsSolved] = useState(false);
            const [isFailed, setIsFailed] = useState(false);
            const [attempts, setAttempts] = useState(1);
            const [mistakes, setMistakes] = useState(0);
            const [totalMistakes, setTotalMistakes] = useState(0);
            
            const [dragState, setDragState] = useState({ isDragging: false, symbol: null, x: 0, y: 0 });
            const [hoveredCell, setHoveredCell] = useState(null);

            const level = LEVELS[currentLevelIdx];
            const currentMistakeLimit = level.id + 1;

            useEffect(() => {
                resetBoard();
                getSounds();
            }, [currentLevelIdx]);

            const resetBoard = () => {
                setIsGenerating(true);
                setIsSolved(false);
                setIsFailed(false);
                setAttempts(1);
                setMistakes(0);
                setTotalMistakes(0);
                setDragState({ isDragging: false, symbol: null, x: 0, y: 0 });
                setHoveredCell(null);
                
                setTimeout(() => {
                    const newPuzzle = generatePuzzle(level.size, level.targetHoles, level.symbols);
                    setInitialBoard(newPuzzle);
                    setBoard(newPuzzle.map(row => [...row]));
                    setIsGenerating(false);
                }, 50);
            };

            const restartCurrentBoard = () => {
                if (isGenerating || initialBoard.length === 0) return;
                setIsSolved(false);
                setIsFailed(false);
                setAttempts(a => a + 1); 
                setMistakes(0); 
                setDragState({ isDragging: false, symbol: null, x: 0, y: 0 });
                setHoveredCell(null);
                setShakingCells(new Set());
                setBoard(initialBoard.map(row => [...row]));
                playSound('pop');
            };

            const getConflicts = () => {
                const conflicts = new Set();
                if (!board || board.length !== level.size) return conflicts;
                
                const size = level.size;
                
                for (let r = 0; r < size; r++) {
                    const seen = {};
                    for (let c = 0; c < size; c++) {
                        const val = board[r] && board[r][c];
                        if (val) {
                            if (seen[val] !== undefined) {
                                conflicts.add(r+','+c);
                                conflicts.add(r+','+seen[val]);
                            } else {
                                seen[val] = c;
                            }
                        }
                    }
                }
                
                for (let c = 0; c < size; c++) {
                    const seen = {};
                    for (let r = 0; r < size; r++) {
                        const val = board[r] && board[r][c];
                        if (val) {
                            if (seen[val] !== undefined) {
                                conflicts.add(r+','+c);
                                conflicts.add(seen[val]+','+c);
                            } else {
                                seen[val] = r;
                            }
                        }
                    }
                }
                return conflicts;
            };

            const conflicts = useMemo(() => getConflicts(), [board, level]);

            useEffect(() => {
                if (!board || board.length !== level.size || isFailed) return;

                let isFull = true;
                for (let r = 0; r < level.size; r++) {
                    for (let c = 0; c < level.size; c++) {
                        if (!board[r][c]) {
                            isFull = false;
                            break;
                        }
                    }
                }

                if (isFull && conflicts.size === 0) {
                    setIsSolved(true);
                    playSound('win');
                    if (window.confetti) {
                        window.confetti({
                            particleCount: 200,
                            spread: 80,
                            origin: { y: 0.5 },
                            colors: ['#e52521', '#004aad', '#fbd000', '#43b047']
                        });
                    }
                } else {
                    setIsSolved(false);
                }
            }, [board, conflicts, level.size, isFailed]);

            const symbolCounts = useMemo(() => {
                const counts = {};
                if (!board || board.length !== level.size) return counts;
                level.symbols.forEach(sym => counts[sym] = 0);
                for (let r = 0; r < level.size; r++) {
                    for (let c = 0; c < level.size; c++) {
                        const val = board[r][c];
                        if (val && counts[val] !== undefined) {
                            counts[val]++;
                        }
                    }
                }
                return counts;
            }, [board, level]);

            const handleCellClick = (r, c) => {
                if (isSolved || isFailed || isGenerating) return;
                if (initialBoard[r] && initialBoard[r][c] !== null) return; 
                if (board[r][c] === null) return; 
                
                const newBoard = board.map(row => [...row]);
                newBoard[r][c] = null;
                
                const currentMistakes = mistakes + 1;
                setMistakes(currentMistakes);
                setTotalMistakes(prev => prev + 1);

                if (currentMistakes >= currentMistakeLimit) {
                    playSound('fail');
                    setIsFailed(true);
                } else {
                    playSound('pop');
                }
                
                setBoard(newBoard);
            };

            const handleSymbolDrop = (symId, r, c) => {
                if (isSolved || isFailed || isGenerating) return;
                if (initialBoard[r] && initialBoard[r][c] !== null) return; 
                
                const newBoard = board.map(row => [...row]);
                
                let currentMistakes = mistakes;
                if (board[r][c] !== null && board[r][c] !== symId) {
                    currentMistakes += 1;
                    setMistakes(currentMistakes);
                    setTotalMistakes(prev => prev + 1);
                }

                newBoard[r][c] = symId;
                
                let hasError = false;
                for (let i = 0; i < level.size; i++) {
                    if (i !== c && newBoard[r][i] === symId) hasError = true;
                    if (i !== r && newBoard[i][c] === symId) hasError = true;
                }

                if (currentMistakes >= currentMistakeLimit) {
                    playSound('fail');
                    setIsFailed(true);
                    setBoard(newBoard); 
                    return;
                }

                if (hasError) {
                    playSound('error');
                    setShakingCells(new Set([r+','+c]));
                    setTimeout(() => setShakingCells(new Set()), 500); 
                } else {
                    playSound('pop');
                }

                setBoard(newBoard);
            };

            const startDrag = (e, sym) => {
                if (isSolved || isFailed || isGenerating) return;
                if (e.button !== 0 && e.button !== undefined) return; 
                
                e.currentTarget.setPointerCapture(e.pointerId);
                setDragState({
                    isDragging: true,
                    symbol: sym,
                    x: e.clientX,
                    y: e.clientY
                });
                setHoveredCell(null);
            };

            const doDrag = (e) => {
                if (!dragState.isDragging) return;
                setDragState(prev => ({ ...prev, x: e.clientX, y: e.clientY }));

                const target = document.elementFromPoint(e.clientX, e.clientY);
                const cell = (target && target.closest) ? target.closest('[data-r]') : null;
                
                if (cell) {
                    const r = parseInt(cell.getAttribute('data-r'));
                    const c = parseInt(cell.getAttribute('data-c'));
                    if (hoveredCell === null || hoveredCell.r !== r || hoveredCell.c !== c) {
                        setHoveredCell({ r, c });
                    }
                } else {
                    if (hoveredCell !== null) setHoveredCell(null);
                }
            };

            const endDrag = (e) => {
                if (!dragState.isDragging) return;
                e.currentTarget.releasePointerCapture(e.pointerId);
                
                const target = document.elementFromPoint(e.clientX, e.clientY);
                const cell = (target && target.closest) ? target.closest('[data-r]') : null;
                
                if (cell) {
                    const r = parseInt(cell.getAttribute('data-r'));
                    const c = parseInt(cell.getAttribute('data-c'));
                    handleSymbolDrop(dragState.symbol, r, c);
                }
                
                setDragState({ isDragging: false, symbol: null, x: 0, y: 0 });
                setHoveredCell(null);
            };

            const nextLevel = () => {
                if (currentLevelIdx < LEVELS.length - 1) {
                    setCurrentLevelIdx(currentLevelIdx + 1);
                } else {
                    setCurrentLevelIdx(0); 
                }
            };

            return (
            <div className="w-full h-full sm:h-[96dvh] max-w-[900px] mx-auto bg-[#f3f4f6] relative flex flex-col overflow-hidden select-none sm:rounded-[2.5rem] sm:shadow-[0_0_40px_rgba(0,0,0,0.3)] sm:border-[6px] border-[#002f6c]">
                
                {/* Drag Element */}
                {dragState.isDragging && (
                    <div 
                        className="fixed z-50 pointer-events-none transition-transform"
                        style={{
                            left: dragState.x,
                            top: dragState.y,
                            transform: 'translate(-50%, -50%) scale(1.15) rotate(-8deg)',
                        }}
                    >
                        <div className="w-16 h-16 sm:w-24 sm:h-24 flex items-center justify-center text-4xl sm:text-6xl rounded-xl sm:rounded-2xl border-[4px] sm:border-[6px] bg-white border-[#004aad] text-[#004aad] overflow-hidden shadow-lg">
                            <span className="pointer-events-none w-full h-full flex items-center justify-center">
                                {SYMBOLS[dragState.symbol].imgUrl ? 
                                    <img src={SYMBOLS[dragState.symbol].imgUrl} alt={SYMBOLS[dragState.symbol].name} className="w-[85%] h-[85%] object-contain pointer-events-none rounded-lg" draggable={false} /> : 
                                    SYMBOLS[dragState.symbol].emoji}
                            </span>
                        </div>
                    </div>
                )}

                {/* Header - מוקטן כדי לחסוך מקום בגובה */}
                <div className="bg-[#e52521] text-white p-2 sm:p-3 pb-3 flex flex-col items-center relative z-10 border-b-[3px] border-[#8a0a07] shrink-0">
                    <h1 className="text-2xl sm:text-4xl font-black mb-1 tracking-wide flex items-center gap-2">
                        סודוקו מריו
                    </h1>
                    <p className="text-[#fbd000] text-xs sm:text-base mb-2 text-center font-bold">
                        מלאו את הלוח בלי כפילויות בשורות ובטורים!
                    </p>
                    
                    <div className="flex items-center justify-center w-full max-w-[700px] mx-auto">
                        <div className="flex items-center gap-1.5 sm:gap-2">
                            <span className="text-white font-black text-sm sm:text-base ml-1">רמה</span>
                            {LEVELS.map((lvl, idx) => {
                                const isSelected = currentLevelIdx === idx;
                                return (
                                    <button 
                                        key={lvl.id}
                                        onClick={() => {
                                            if (currentLevelIdx === idx) {
                                                resetBoard();
                                            } else {
                                                setCurrentLevelIdx(idx);
                                            }
                                        }}
                                        disabled={isGenerating}
                                        className={`w-7 h-7 sm:w-9 sm:h-9 rounded-full flex items-center justify-center text-xs sm:text-sm font-black transition-all ${
                                            isSelected 
                                            ? 'bg-[#fbd000] text-[#b0100d] border-b-[2px] border-[#c29600] translate-y-[-1px]' 
                                            : 'bg-[#004aad] text-white border-b-[2px] border-[#002f6c] hover:bg-[#1a5ebf] active:border-b-0 active:translate-y-[1px]'
                                        } ${isGenerating ? 'opacity-50 cursor-not-allowed' : ''}`}
                                    >
                                        {lvl.id}
                                    </button>
                                );
                            })}
                        </div>

                        <button 
                            onClick={restartCurrentBoard}
                            disabled={isGenerating}
                            className={`w-7 h-7 sm:w-9 sm:h-9 rounded-full flex items-center justify-center text-sm font-black transition-all bg-[#e52521] text-white border-b-[2px] border-[#b0100d] hover:bg-[#ff3b30] active:border-b-0 active:translate-y-[1px] mr-3 ${isGenerating ? 'opacity-50 cursor-not-allowed' : ''}`}
                            title="נקה לוח"
                        >
                            ↻
                        </button>
                    </div>
                </div>

                {/* Game Board Container - תופס את השטח הנותר באמצע */}
                <div className="flex-1 p-2 flex flex-col items-center justify-center bg-[#a8d3ff] relative z-0 min-h-0 w-full overflow-hidden">
                    
                    <div className="w-full flex flex-col items-center justify-center h-full max-h-full">
                        
                        <div className="flex justify-between w-full max-w-[min(96%,calc(100dvh-260px))] mx-auto px-1 mb-1 text-[#004aad] font-bold text-xs sm:text-base">
                            <span>ניסיון מס' {attempts}</span>
                            <span className={mistakes > 0 ? "text-[#e52521] font-black" : ""}>
                                פסילות: {mistakes}/{currentMistakeLimit}
                            </span>
                        </div>

                        {/* Win Screen */}
                        {isSolved && (
                            <div className="absolute inset-0 z-30 flex items-center justify-center bg-black/40 backdrop-blur-[2px] pop-in px-4">
                                <div className="bg-[#fbd000] p-4 sm:p-6 rounded-3xl text-center border-4 border-white max-w-full transform transition-transform shadow-2xl">
                                    <div className="text-4xl sm:text-5xl mb-2 tracking-widest">
                                        {attempts === 1 && totalMistakes === 0 ? '🌟🌟🌟' : '🌟'}
                                    </div>
                                    <h2 className="text-2xl sm:text-3xl font-black text-[#e52521] mb-2">
                                        {attempts === 1 && totalMistakes === 0 ? 'אליפות!' : 'ניצחון!'}
                                    </h2>
                                    <p className="text-red-900 font-bold text-sm sm:text-base mb-2">
                                        סיימת את {level.name} {attempts === 1 && totalMistakes === 0 ? 'בהצלחה מושלמת!' : 'בהצלחה!'}
                                    </p>
                                    <p className="text-[#004aad] font-black text-xs sm:text-sm mb-4">
                                        ניסיונות: {attempts} | סה"כ פסילות: {totalMistakes}
                                    </p>
                                    <button 
                                        onClick={nextLevel}
                                        className="bg-[#43b047] text-white px-6 py-2 rounded-full font-black text-base sm:text-lg border-b-[4px] border-[#2d7d30] hover:bg-[#4cc550] active:border-b-0 active:translate-y-[4px] transition-all w-full"
                                    >
                                        {currentLevelIdx < LEVELS.length - 1 ? 'לשלב הבא! ➡️' : 'שחק שוב! 🔄'}
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* Fail Screen */}
                        {isFailed && (
                            <div className="absolute inset-0 z-30 flex items-center justify-center bg-black/50 backdrop-blur-[2px] pop-in px-4">
                                <div className="bg-white p-4 sm:p-6 rounded-3xl text-center border-4 border-[#e52521] max-w-full transform transition-transform shadow-2xl">
                                    <div className="text-5xl sm:text-6xl mb-2">🤦‍♂️</div>
                                    <h2 className="text-2xl sm:text-3xl font-black text-[#e52521] mb-2">אוי לא!</h2>
                                    <p className="text-slate-700 font-bold text-sm sm:text-base mb-6">צברת יותר מדי פסילות ({currentMistakeLimit}).</p>
                                    <button 
                                        onClick={restartCurrentBoard}
                                        className="bg-[#e52521] text-white px-6 py-2 rounded-full font-black text-base sm:text-lg border-b-[4px] border-[#b0100d] hover:bg-[#ff3b30] active:border-b-0 active:translate-y-[4px] transition-all w-full"
                                    >
                                        נסה שוב ↻
                                    </button>
                                </div>
                            </div>
                        )}

                        <div 
                            className={`board-wrapper grid gap-1 sm:gap-1.5 bg-[#00008b] p-1.5 sm:p-2 rounded-xl sm:rounded-2xl transition-opacity duration-300 shadow-inner ${isGenerating ? 'opacity-40 pointer-events-none' : 'opacity-100'}`}
                            style={{ gridTemplateColumns: 'repeat(' + level.size + ', minmax(0, 1fr))' }}
                        >
                            {board.length === level.size && board.map((row, r) => (
                            row.map((cellValue, c) => {
                                const isGiven = initialBoard[r] && initialBoard[r][c] !== null;
                                const isConflict = conflicts.has(r+','+c);
                                const isShaking = shakingCells.has(r+','+c);
                                const isHovered = hoveredCell && hoveredCell.r === r && hoveredCell.c === c;

                                let cellStyles = "bg-white border-b-[3px] sm:border-b-[4px] border-gray-300";
                                const emojiSizeClass = level.size === 4 ? "emoji-size-4" : "emoji-size-6";
                                const imgSizeClass = "w-[75%] h-[75%]";
                                
                                if (isGiven) {
                                    cellStyles = "bg-[#fbd000] border-b-[3px] sm:border-b-[4px] border-[#c29600] cursor-default";
                                } else if (isConflict) {
                                    cellStyles = "bg-[#ffb3b3] border-b-[3px] sm:border-b-[4px] border-[#d32f2f] ring-inset ring-2 ring-[#d32f2f] cursor-pointer hover:bg-[#ffcdd2]";
                                } else if (cellValue !== null) {
                                    cellStyles += " cursor-pointer hover:bg-[#ffebee] hover:border-[#ffcdd2]";
                                }
                                
                                if (isHovered && !isGiven) {
                                    cellStyles = "bg-[#e6f0fa] border-b-[3px] sm:border-b-[4px] border-gray-300 ring-inset ring-2 ring-[#fbd000] scale-105 z-20";
                                }

                                return (
                                    <div 
                                        key={`${r}-${c}`}
                                        data-r={r}
                                        data-c={c}
                                        onClick={() => handleCellClick(r, c)}
                                        className={`
                                            aspect-square flex items-center justify-center transition-all rounded-lg sm:rounded-xl overflow-hidden
                                            ${cellStyles}
                                            ${isShaking ? 'shake' : ''}
                                        `}
                                    >
                                        <span className={`pointer-events-none w-full h-full flex items-center justify-center ${emojiSizeClass} ${isGiven ? 'opacity-90' : 'pop-in'}`}>
                                            {cellValue ? (
                                                SYMBOLS[cellValue].imgUrl ? 
                                                <img src={SYMBOLS[cellValue].imgUrl} alt={SYMBOLS[cellValue].name} className={`${imgSizeClass} object-contain pointer-events-none rounded-md`} draggable={false} /> :
                                                SYMBOLS[cellValue].emoji
                                            ) : ''}
                                        </span>
                                    </div>
                                );
                            })
                        ))}
                        </div>
                    </div>
                </div>

                {/* סרגל כלים (גרירת סמלים) - תמיד בתחתית המסך */}
            <div className="bg-[#ff8c00] border-t-[4px] border-[#c76b00] p-2 pb-3 relative z-20 shrink-0">
                <div className="text-white text-xs sm:text-base font-bold text-center mb-2 w-full">
                    👆 גררו סמל למשבצת (לחיצה למחיקה)
                </div>

                <div className="flex justify-center items-start gap-2 sm:gap-4 w-full max-w-[800px] mx-auto px-1">
                    {level.symbols.map(sym => {
                        const remaining = level.size - (symbolCounts[sym] || 0);
                            const isExhausted = remaining <= 0;
                            const isBeingDragged = dragState.isDragging && dragState.symbol === sym;
                            
                            return (
                                <div key={sym} className="flex flex-col items-center flex-1 relative max-w-[4.5rem] sm:max-w-[7rem]">
                                    <div
                                        onPointerDown={(e) => { if (!isExhausted) startDrag(e, sym) }}
                                        onPointerMove={doDrag}
                                        onPointerUp={endDrag}
                                        onPointerCancel={endDrag}
                                        className={`
                                            w-full aspect-square flex items-center justify-center text-2xl sm:text-3xl rounded-xl border-b-[3px] transition-all touch-none-strict overflow-hidden
                                            ${isExhausted 
                                                ? 'bg-orange-100 border-orange-300 opacity-50 grayscale cursor-not-allowed' 
                                                : 'bg-white border-[#004aad] text-[#004aad] hover:bg-[#e6f0fa] cursor-grab active:cursor-grabbing'}
                                            ${isBeingDragged ? 'opacity-30 translate-y-[2px] border-b-0 cursor-grabbing' : ''}
                                        `}
                                        title={SYMBOLS[sym].name}
                                    >
                                        <span className="pointer-events-none w-full h-full flex items-center justify-center">
                                            {SYMBOLS[sym].imgUrl ? 
                                                <img src={SYMBOLS[sym].imgUrl} alt={SYMBOLS[sym].name} className="w-[80%] h-[80%] object-contain pointer-events-none rounded-md" draggable={false} /> : 
                                                SYMBOLS[sym].emoji}
                                        </span>
                                    </div>
                                    <span className={`text-xs sm:text-sm font-black mt-1 ${isExhausted ? 'text-orange-200' : 'text-white'}`}>
                                    {Math.max(0, remaining)}
                                </span>
                            </div>
                        );
                    })}
                </div>
            </div>
        </div>
    );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
    <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('Service Worker רשום בהצלחה!', reg))
        .catch(err => console.error('שגיאה ברישום Service Worker:', err));
    });
  }
</script>
</body>
</html>
